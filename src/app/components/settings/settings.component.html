<mat-card>
    <mat-card-header>
        <mat-card-title>Settings</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <mat-form-field>
            <input matInput type="text" placeholder="Gemini API Key" [(ngModel)]="settings().geminiApiKey">
        </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
        <button mat-button color="accent" (click)="saveSettings()" type="button">
            <mat-icon>save</mat-icon>
            <span>Save</span>
        </button>
    </mat-card-actions>
    <mat-card-footer>
        <mat-progress-bar [mode]="isBusy() ? 'indeterminate' : 'determinate'"></mat-progress-bar>
    </mat-card-footer>
</mat-card>
